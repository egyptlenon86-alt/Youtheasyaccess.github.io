<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouthConnect NYC | Opportunity Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-mode">
    <header class="main-header">
        <div class="header-container">
            <div class="header-nav-items">
                <a href="#" class="nav-item"><i class="fas fa-rocket"></i><span>Top Content</span></a>
                <a href="#" class="nav-item"><i class="fas fa-users"></i><span>People</span></a>
                <a href="#" class="nav-item"><i class="fas fa-graduation-cap"></i><span>Learning</span></a>
                <a href="#" class="nav-item active"><i class="fas fa-briefcase"></i><span>Jobs</span></a>
                <a href="#" class="nav-item"><i class="fas fa-puzzle-piece"></i><span>Games</span></a>
            </div>
            <div class="header-divider"></div>
            <div class="header-auth" id="authSection">
                <button class="btn-signin" onclick="openLogin()">Sign in</button>
                <button class="btn-join" onclick="openLogin()">Join now</button>
            </div>
        </div>
    </header>

    <main class="content-grid">
        <section class="hero-card">
            <h1>Ready to take the next step?</h1>
            <p>Connecting NYC youth to their best opportunities.</p>
            <div class="search-container">
                <input type="text" placeholder="Search jobs, internships, training...">
                <button><i class="fas fa-search"></i></button>
            </div>
        </section>

        <section class="job-feed">
            <h2>Recommended for You</h2>
            <div id="jobCards"></div>
        </section>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLogin()">&times;</span>
            <h2>Ready to take the next step?</h2>
            <button class="social-btn"><i class="fab fa-google"></i> Continue with Google</button>
            <div class="divider"><span>or</span></div>
            <input type="email" placeholder="Email address *">
            <button class="btn-continue" onclick="handleSignIn()">Continue <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <button class="ai-floating-btn" onclick="toggleLuke()"><i class="fas fa-robot"></i> Ask Luke</button>
    <div id="lukeAI" class="ai-modal">
        <div class="ai-header"><span>Luke - AI Guide</span><button onclick="toggleLuke()">&times;</button></div>
        <div class="ai-chat-body" id="chatBody"></div>
        <div class="ai-footer"><input type="text" id="lukeInput"><button onclick="sendLukeMessage()">Send</button></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
