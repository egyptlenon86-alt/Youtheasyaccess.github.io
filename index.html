<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Youth Job Connect</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <h1>YouthConnect NYC</h1>
  <nav>
    <button onclick="showPage('jobs')">Jobs</button>
    <button onclick="showPage('map')">Maps</button>
    <button onclick="showPage('training')">Work Readiness</button>
    <button onclick="showPage('account')">Account</button>
  </nav>
</header>

<!-- LOGIN -->
<section id="auth">
  <h2>Sign In / Sign Up</h2>
  <button onclick="login()">Continue with Email</button>
  <button onclick="login()">Continue with Google</button>
  <button onclick="login()">Continue with Apple</button>
</section>

<!-- SURVEY MODAL -->
<div id="surveyModal" class="modal hidden">
  <div class="modal-content">
    <h2>Tell us about you</h2>
    <label>What jobs interest you?</label>
    <input type="text" id="interestInput"/>

    <label>Any past experience?</label>
    <input type="text" id="experienceInput"/>

    <button onclick="saveSurvey()">Submit</button>
  </div>
</div>

<!-- SEARCH -->
<div id="searchBar" class="hidden">
  <input type="text" id="searchInput" placeholder="Search jobs..." onkeyup="searchJobs()" />
</div>

<!-- JOBS PAGE -->
<section id="jobs" class="page hidden">
  <h2>Job Listings</h2>
  <div id="jobList"></div>
</section>

<!-- MAP PAGE -->
<section id="map" class="page hidden">
  <h2>NYC Job Map</h2>
  <div class="map-placeholder">[Map Integration Coming Soon]</div>
</section>

<!-- TRAINING PAGE -->
<section id="training" class="page hidden">
  <h2>Work Readiness Training</h2>
  <ul>
    <li>Resume Writing</li>
    <li>Interview Skills</li>
    <li>Workplace Basics</li>
  </ul>
</section>

<!-- ACCOUNT PAGE -->
<section id="account" class="page hidden">
  <h2>My Account</h2>
  <p><strong>Interests:</strong> <span id="savedInterest"></span></p>
  <p><strong>Experience:</strong> <span id="savedExperience"></span></p>

  <h3>Upload Resume</h3>
  <input type="file" />

  <h3>Jobs Applied</h3>
  <ul id="appliedJobs"></ul>
</section>

<!-- MESSENGER -->
<div id="messenger">
  <h3>Messages</h3>
  <div class="chat-box" id="chatBox"></div>
  <input type="text" id="chatInput" placeholder="Ask Luke..." />
  <button onclick="sendMessage()">Send</button>
</div>

<!-- AI ASSISTANT -->
<div id="aiAssistant" onclick="speakAI()">
  🎧 Ask Luke
</div>

<script src="script.js"></script>
</body>
</html>
